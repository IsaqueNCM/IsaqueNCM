name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"   # todo dia à meia-noite
  workflow_dispatch:      # permite rodar manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: IsaqueNCM
          svg_out_path: github-contribution-grid-snake.svg

      - name: Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update snake contribution grid"
          branch: output
